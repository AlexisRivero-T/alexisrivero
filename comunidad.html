<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comunidad — Red Católica Alexis Rivero</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet">
    
    <!-- LIBRERÍAS DE FIREBASE (Para la base de datos en vivo) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0a0a0a;--bg2:#171717;--card:rgba(255,255,255,0.05);--t1:#fff;--t2:rgba(255,255,255,0.7);--t3:rgba(255,255,255,0.4);--acc:#10b981;--accg:rgba(16,185,129,0.15);--bdr:rgba(255,255,255,0.1);--red:#ef4444}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);padding-top:80px;line-height:1.6}
        header{position:fixed;top:0;left:0;right:0;height:64px;background:rgba(10,10,10,0.8);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:between;padding:0 24px;z-index:100}
        .logo{font-family:'Bricolage Grotesque',sans-serif;font-size:16px;font-weight:700;text-decoration:none;color:var(--t1);display:flex;align-items:center;gap:8px}
        .logo i{color:var(--acc)}
        .btn-admin{background:transparent;border:1px solid var(--bdr);color:var(--t2);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;transition:.2s}
        .btn-admin:hover{border-color:var(--acc);color:var(--acc)}
        .container{max-width:680px;margin:0 auto;padding:24px 16px}
        
        /* PANEL DE PUBLICACIÓN (Solo Admin) */
        .admin-panel{background:var(--bg2);border:1px solid var(--acc);border-radius:16px;padding:20px;margin-bottom:32px;display:none}
        .admin-panel.active{display:block}
        .panel-title{font-family:'Bricolage Grotesque',sans-serif;font-size:18px;margin-bottom:14px;color:var(--acc);display:flex;align-items:center;gap:8px}
        .form-group{margin-bottom:12px}
        .form-group label{display:block;font-size:12px;color:var(--t2);margin-bottom:4px}
        input,textarea,select{width:100%;background:rgba(0,0,0,0.3);border:1px solid var(--bdr);border-radius:8px;padding:10px;color:#fff;font-family:inherit;font-size:14px}
        input:focus,textarea:focus,select:focus{outline:none;border-color:var(--acc)}
        .btn-pub{background:var(--acc);color:#000;border:none;padding:12px;border-radius:8px;font-weight:600;width:100%;cursor:pointer;margin-top:8px;transition:.2s}
        .btn-pub:hover{opacity:0.9}

        /* FEED DE PUBLICACIONES */
        .post{background:var(--card);border:1px solid var(--bdr);border-radius:16px;padding:20px;margin-bottom:24px;position:relative}
        .post-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
        .post-badge{font-size:11px;font-weight:600;text-transform:uppercase;padding:4px 8px;background:var(--accg);color:var(--acc);border-radius:6px}
        .post-date{font-size:12px;color:var(--t3)}
        .post-title{font-family:'Bricolage Grotesque',sans-serif;font-size:20px;margin-bottom:10px;line-height:1.3}
        .post-text{color:var(--t2);font-size:15px;white-space:pre-wrap;margin-bottom:14px}
        
        /* CONTENEDORES MULTIMEDIA */
        .media-box{margin-bottom:14px;border-radius:10px;overflow:hidden;background:rgba(0,0,0,0.2)}
        .media-box img{width:100%;display:block;max-height:400px;object-fit:cover}
        .media-box video{width:100%;display:block}
        .media-box audio{width:100%;padding:10px;display:block}
        .media-box iframe{width:100%;aspect-ratio:16/9;border:none;display:block}

        /* REACCIONES Y COMENTARIOS */
        .post-actions{display:flex;align-items:center;gap:16px;border-top:1px solid rgba(255,255,255,0.05);padding-top:12px;margin-bottom:16px}
        .action-btn{background:transparent;border:none;color:var(--t2);cursor:pointer;display:flex;align-items:center;gap:6px;font-size:13px;transition:.2s}
        .action-btn:hover, .action-btn.liked{color:var(--acc)}
        .action-btn i{font-size:18px}
        
        .comments-section{border-top:1px solid rgba(255,255,255,0.05);padding-top:14px}
        .comment-form{display:flex;gap:8px;margin-bottom:14px}
        .comment-form input{flex:1;padding:8px 12px;font-size:13px}
        .comment-form button{background:rgba(255,255,255,0.1);border:1px solid var(--bdr);color:#fff;padding:0 14px;border-radius:8px;cursor:pointer;font-size:13px}
        .comment-form button:hover{background:var(--accg);border-color:var(--acc)}
        
        .comment-list{display:flex;flex-direction:column;gap:8px}
        .comment{background:rgba(0,0,0,0.2);padding:10px 12px;border-radius:10px;font-size:13px;position:relative;display:flex;justify-content:space-between;align-items:start}
        .comment-content{flex:1;padding-right:24px}
        .comment-author{font-weight:600;color:var(--acc);margin-right:6px}
        .comment-text{color:var(--t2)}
        
        /* BOTONES DE ELIMINAR (Solo Admin) */
        .btn-del{background:transparent;border:none;color:var(--t3);cursor:pointer;font-size:14px;display:none;transition:.2s}
        .btn-del:hover{color:var(--red)}
        .admin-active .btn-del{display:inline-block}
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo"><i class="ri-cross-line"></i> Red Católica Alexis Rivero</a>
    <button class="btn-admin" id="btnAdmin" onclick="toggleAdmin()"><i class="ri-lock-line"></i> Modo Admin</button>
</header>

<div class="container">

    <!-- PANEL DE ADMINISTRACIÓN OCULTO -->
    <div class="admin-panel" id="adminPanel">
        <div class="panel-title"><i class="ri-pencil-line"></i> Crear Nueva Publicación</div>
        <div class="form-group">
            <label>Título</label>
            <input type="text" id="pTitle" placeholder="Ej: Nueva reflexión sobre la Verdad">
        </div>
        <div class="form-group">
            <label>Categoría</label>
            <select id="pCategory">
                <option value="Reflexiones">Reflexión</option>
                <option value="Noticias">Noticia</option>
                <option value="Textos del Día">Texto del Día</option>
                <option value="Apologética">Apologética</option>
                <option value="Batalla Cultural">Batalla Cultural</option>
            </select>
        </div>
        <div class="form-group">
            <label>Contenido / Texto</label>
            <textarea id="pText" rows="5" placeholder="Escribí acá tu publicación..."></textarea>
        </div>
        <div class="form-group">
            <label>Enlace de Multimedia (Opcional - Imagen, Audio o Video)</label>
            <input type="text" id="pMedia" placeholder="Pegá URL de foto, video de YouTube o archivo de audio">
        </div>
        <button class="btn-pub" onclick="publicarPost()">Publicar en el Muro</button>
    </div>

    <!-- CONTENEDOR DONDE SE VAN A CARGAR LOS POSTS -->
    <div id="feed">
        <p style="text-align:center; color:var(--t3); padding:40px;">Cargando publicaciones del muro...</p>
    </div>

</div>

<script>
    // ==========================================
    // CONFIGURACIÓN DE TU BASE DE DATOS (FIREBASE)
    // ==========================================
    const firebaseConfig = {
        apiKey: "TU_API_KEY_ACÁ",
        authDomain: "TU_PROJECT_ID.firebaseapp.com",
        projectId: "TU_PROJECT_ID",
        storageBucket: "TU_PROJECT_ID.appspot.com",
        messagingSenderId: "TU_MESSAGING_SENDER_ID",
        appId: "TU_APP_ID"
    };
    
    // Inicializar Firebase solo si las llaves están configuradas
    if(firebaseConfig.apiKey !== "TU_API_KEY_ACÁ") {
        firebase.initializeApp(firebaseConfig);
        var db = firebase.firestore();
    } else {
        // Modo demostración local si no configuraste Firebase todavía
        document.getElementById('feed').innerHTML = '<p style="text-align:center; color:var(--acc); padding:20px; border:1px dashed var(--acc); border-radius:12px;">¡Código instalado con éxito! Para que empiece a guardar los comentarios de tu audiencia, debés vincular tus llaves gratuitas de Firebase en la línea 110 del código.</p>';
    }

    let isAdmin = false;
    // Podes cambiar este PIN por el número que vos quieras para entrar
    const CLAVE_ADMIN = "1234"; 

    function toggleAdmin() {
        if (!isAdmin) {
            let pass = prompt("Ingresá tu PIN de Administrador para publicar y moderar:");
            if (pass === CLAVE_ADMIN) {
                isAdmin = true;
                document.getElementById('adminPanel').classList.add('active');
                document.body.classList.add('admin-active');
                document.getElementById('btnAdmin').innerHTML = '<i class="ri-lock-unlock-line"></i> Admin Activo';
                document.getElementById('btnAdmin').style.borderColor = 'var(--acc)';
            } else if (pass !== null) {
                alert("Clave incorrecta.");
            }
        } else {
            isAdmin = false;
            document.getElementById('adminPanel').classList.remove('active');
            document.body.classList.remove('admin-active');
            document.getElementById('btnAdmin').innerHTML = '<i class="ri-lock-line"></i> Modo Admin';
            document.getElementById('btnAdmin').style.borderColor = 'var(--bdr)';
        }
    }

    // Cargar publicaciones en tiempo real desde la Base de Datos
    if(db) {
        db.collection("posts").orderBy("date", "desc").onSnapshot((snapshot) => {
            const feed = document.getElementById("feed");
            feed.innerHTML = "";
            
            if(snapshot.empty) {
                feed.innerHTML = '<p style="text-align:center; color:var(--t3); padding:40px;">No hay publicaciones en el muro todavía.</p>';
                return;
            }

            snapshot.forEach((doc) => {
                const post = doc.data();
                const postId = doc.id;
                const dateFormatted = post.date ? new Date(post.date.toDate()).toLocaleDateString() : '';

                let mediaHTML = '';
                if(post.media) {
                    if(post.media.includes('youtube.com') || post.media.includes('youtu.be')) {
                        let vidId = post.media.includes('v=') ? post.media.split('v=')[1].split('&')[0] : post.media.split('/').pop();
                        mediaHTML = `<div class="media-box"><iframe src="https://www.youtube.com/embed/${vidId}"></iframe></div>`;
                    } else if (post.media.endsWith('.mp3') || post.media.endsWith('.wav') || post.media.includes('audio')) {
                        mediaHTML = `<div class="media-box"><audio src="${post.media}" controls></audio></div>`;
                    } else if (post.media.endsWith('.mp4') || post.media.includes('video')) {
                        mediaHTML = `<div class="media-box"><video src="${post.media}" controls></video></div>`;
                    } else {
                        mediaHTML = `<div class="media-box"><img src="${post.media}" alt="Media"></div>`;
                    }
                }

                let postElement = document.createElement("div");
                postElement.className = "post";
                postElement.innerHTML = `
                    <div class="post-header">
                        <span class="post-badge">${post.category}</span>
                        <span class="post-date">${dateFormatted}</span>
                    </div>
                    <h3 class="post-title">${post.title}</h3>
                    <p class="post-text">${post.text}</p>
                    ${mediaHTML}
                    <div class="post-actions">
                        <button class="action-btn" onclick="reaccionar('${postId}', ${post.likes || 0})">
                            <i class="ri-heart-3-fill"></i> <span id="l-${postId}">${post.likes || 0}</span> Me gusta
                        </button>
                        <button class="btn-del" onclick="eliminarPost('${postId}')" style="margin-left:auto;"><i class="ri-delete-bin-line"></i> Eliminar Post</button>
                    </div>
                    <div class="comments-section">
                        <div class="comment-form">
                            <input type="text" id="c-name-${postId}" placeholder="Tu nombre">
                            <input type="text" id="c-text-${postId}" placeholder="Escribí un comentario...">
                            <button onclick="comentar('${postId}')">Enviar</button>
                        </div>
                        <div class="comment-list" id="comments-${postId}"></div>
                    </div>
                `;
                feed.appendChild(postElement);
                cargarComentarios(postId);
            });
        });
    }

    function publicarPost() {
        const title = document.getElementById("pTitle").value;
        const category = document.getElementById("pCategory").value;
        const text = document.getElementById("pText").value;
        const media = document.getElementById("pMedia").value;

        if(!title || !text) {
            alert("Por favor, completá el título y el contenido.");
            return;
        }

        db.collection("posts").add({
            title: title,
            category: category,
            text: text,
            media: media,
            likes: 0,
            date: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            document.getElementById("pTitle").value = "";
            document.getElementById("pText").value = "";
            document.getElementById("pMedia").value = "";
        });
    }

    function reaccionar(postId, currentLikes) {
        db.collection("posts").doc(postId).update({
            likes: currentLikes + 1
        });
    }

    function comentar(postId) {
        const nameInput = document.getElementById(`c-name-${postId}`);
        const textInput = document.getElementById(`c-text-${postId}`);
        
        let name = nameInput.value.trim() || "Anónimo";
        let text = textInput.value.trim();

        if(!text) return;

        db.collection("posts").doc(postId).collection("comments").add({
            author: name,
            text: text,
            date: firebase.firestore.FieldValue.serverTimestamp()
        }).then(() => {
            nameInput.value = "";
            textInput.value = "";
        });
    }

    function cargarComentarios(postId) {
        db.collection("posts").doc(postId).collection("comments").orderBy("date", "asc").onSnapshot((snapshot) => {
            const cList = document.getElementById(`comments-${postId}`);
            cList.innerHTML = "";
            snapshot.forEach((doc) => {
                const c = doc.data();
                const cId = doc.id;
                const div = document.createElement("div");
                div.className = "comment";
                div.innerHTML = `
                    <div class="comment-content">
                        <span class="comment-author">${c.author}:</span>
                        <span class="comment-text">${c.text}</span>
                    </div>
                    <button class="btn-del" onclick="eliminarComentario('${postId}', '${cId}')"><i class="ri-close-line"></i></button>
                `;
                cList.appendChild(div);
            });
        });
    }

    function eliminarPost(postId) {
        if(confirm("¿Estás seguro de que querés eliminar esta publicación por completo?")) {
            db.collection("posts").doc(postId).delete();
        }
    }

    function eliminarComentario(postId, commentId) {
        if(confirm("¿Querés eliminar este comentario inapropiado?")) {
            db.collection("posts").doc(postId).collection("comments").doc(commentId).delete();
        }
    }
</script>
</body>
</html>
